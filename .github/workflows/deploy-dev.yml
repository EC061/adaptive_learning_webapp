name: Build & Deploy (Dev)

on:
  workflow_run:
    workflows: ["CI Validation"]
    types: [completed]
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ec061/adaptive_learning_webapp

jobs:
  build-and-deploy-dev:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.event.workflow_run.head_sha }}

      - name: Deploy dev container to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
            docker compose -f docker-compose.dev.yml up -d --force-recreate --no-build
            docker image prune -f
